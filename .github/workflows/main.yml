name: Fund Automation

on:
  schedule:
    # 02:00 น. เวลาไทย คือ 19:00 น. ของวันก่อนหน้าในเวลา UTC
    # รันเวลา 19:00 UTC ในวัน จันทร์, อังคาร, พุธ, พฤหัส, เสาร์
    # จะตรงกับเวลาไทย 02:00 น. ในวัน อังคาร, พุธ, พฤหัส, ศุกร์, อาทิตย์
    - cron: '0 19 * * 1,2,3,4,6'
  workflow_dispatch: # ปุ่มกดรันเองเพื่อทดสอบ

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # สำคัญ: เพื่อให้บอทเซฟไฟล์ CSV กลับเข้า GitHub ได้

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Dependencies
        run: |
          pip install pandas selenium webdriver-manager beautifulsoup4 lxml html5lib requests numpy quantstats scikit-learn matplotlib seaborn

      - name: Run Fund Automation
        run: python fund_github.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # ดึงข้อมูลล่าสุดจาก main มาก่อนเพื่อกันเส้นแตก
          git fetch origin main
          git checkout main

          # Add ไฟล์ทั้งหมดรวมถึงในโฟลเดอร์
          git add *.csv data_nav/*.csv data_opt/*.csv
          
          # ถ้ามีข้อมูลใหม่ ให้ Push กลับเข้า main ตรงๆ
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update Fund data: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes detected, skipping push."
          fi
